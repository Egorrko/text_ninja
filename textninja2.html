<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Editor Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        #splash-screen, #final-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        #final-screen { display: none; background: rgba(44, 62, 80, 0.95); }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #e67e22;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.05); }

        #game-container {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
            background: white;
        }

        #viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #scroll-track {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform;
        }

        #red-line {
            position: absolute;
            top: 150px;
            left: 0;
            width: 100%;
            height: 4px;
            background: #e74c3c;
            z-index: 10;
            box-shadow: 0 2px 10px rgba(231, 76, 60, 0.3);
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            pointer-events: none;
        }

        .stat-box {
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-align: right;
        }

        .paragraph {
            width: 80%;
            max-width: 800px;
            margin: 40px 0;
            font-size: 24px;
            line-height: 1.6;
            color: #333;
            transition: opacity 0.5s;
        }

        .word {
            display: inline-block;
            padding: 2px 4px;
            margin: 0 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .word:hover { background: #ecf0f1; }
        .highlighted { background: #3498db !important; color: white; }
        .correct { background: #2ecc71 !important; color: white; }
        .missed { background: #95a5a6 !important; color: #fff; text-decoration: line-through; }
        .wiggle { animation: wiggle 0.3s ease; background: #e74c3c !important; color: white; }

        @keyframes wiggle {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>

    <div id="splash-screen">

        <p>Words in [brackets] are fillers. Click them before they cross the red line!<br>Don't click useful words.</p>
        <button id="start-btn" class="btn">Start Game</button>
    </div>

    <div id="game-container">
        <div id="red-line"></div>

            <div class="stat-box" style="font-size: 0.9rem; background: #e67e22;">Mode: Infinite</div>
        </div>
        <div id="viewport">
            <div id="scroll-track"></div>
        </div>
    </div>

    <div id="final-screen">
        <h1>Game Over</h1>
        <p id="final-score"></p>
        <button onclick="location.reload()" class="btn">Try Again</button>
    </div>

"Скульптор [кое-как] доставил тяжелую работу в музей перед, хотя и повредил часть покрытия.",
"Депутаты [зачем-то] внесли мелкие правки в уже согласованный текст.",
"Астроном [как-то] сумел связать новые данные с прежней гипотезой, хотя никто до него этого сделать не мог.",
"Журналисты [кое-как] успели записать интервью после научной презентации, хотя в зале началась суматоха.",
"Критик [зачем-то] сосредоточился на второстепенных деталях картины.",
"Комиссия [почему-то] затянула рассмотрение заявки на культурный проект.",
"Музыкальный коллектив [как-то] уверенно исполнил сложную пьесу на фестивале.",
"Профессор [кое-как] разобрался с запутанными результатами исследования."
    ];

    function getRandomContent() {
        return data[Math.floor(Math.random() * data.length)];
    }

    function createParagraph() {
        const text = getRandomContent();
        const pDiv = document.createElement('div');
        pDiv.className = 'paragraph';
        pDiv.dataset.processed = "false";

        // Regex to split by [word]
        const parts = text.split(/(\[.*?\])/);
        parts.forEach(part => {
            if (part.startsWith('[') && part.endsWith(']')) {
                const wordText = part.slice(1, -1);
                const span = document.createElement('span');
                span.className = 'word unnecessary';
                span.innerText = wordText;
                span.onclick = () => toggleHighlight(span);
                pDiv.appendChild(span);
            } else {
                const words = part.split(' ');
                words.forEach(w => {
                    if (!w) return;
                    const span = document.createElement('span');
                    span.className = 'word regular';
                    span.innerText = w;
                    span.onclick = () => toggleHighlight(span);
                    pDiv.appendChild(span);
                    pDiv.appendChild(document.createTextNode(' '));
                });
            }
        });
        return pDiv;
    }

    function toggleHighlight(el) {
        if (!gameActive || el.classList.contains('correct') || el.classList.contains('missed')) return;
        if (el.classList.contains('highlighted')) {
            el.classList.remove('highlighted');
        } else {
            el.classList.add('highlighted');
            el.classList.remove('wiggle');
        }
    }

    function initGame() {
        score = 0;
        trackY = window.innerHeight; // Start from bottom
        scrollTrack.innerHTML = '';
        for (let i = 0; i < preloadCount; i++) {
            scrollTrack.appendChild(createParagraph());
        }
        scoreBoard.innerText = `Score: ${score}`;
    }

    function processParagraph(pDiv) {
        const words = pDiv.querySelectorAll('.word');
        words.forEach(word => {
            const isUnnecessary = word.classList.contains('unnecessary');
            const isHighlighted = word.classList.contains('highlighted');

            if (isUnnecessary && isHighlighted) {
                score += 10;
                word.classList.remove('highlighted');
                word.classList.add('correct');
            } else if (!isUnnecessary && isHighlighted) {
                score -= 5;
                word.classList.add('wiggle');
            } else if (isUnnecessary && !isHighlighted) {
                score -= 10;
                word.classList.add('missed');
            }
        });
        scoreBoard.innerText = `Score: ${score}`;
        
        // Optional: End game if score drops too low
        if (score < -1000) endGame();
    }

    function gameLoop() {
        if (!gameActive) return;

        trackY -= scrollSpeed;
        scrollTrack.style.transform = `translateY(${trackY}px)`;

        const redLineRect = document.getElementById('red-line').getBoundingClientRect();
        const paragraphs = scrollTrack.querySelectorAll('.paragraph');

        paragraphs.forEach(p => {
            const rect = p.getBoundingClientRect();
            
            // If the top of the paragraph passes the red line
            if (p.dataset.processed === "false" && rect.top <= redLineRect.bottom) {
                p.dataset.processed = "true";
                processParagraph(p);
            }

            // Recycle: If paragraph is completely off-screen (top)
            if (rect.bottom < -500) {
                p.remove();
                scrollTrack.appendChild(createParagraph());
            }
        });

        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameActive = false;
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('final-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = `Your final score: ${score}`;
    }

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        gameActive = true;
        initGame();
        gameLoop();
    };
</script>
</body>
</html>
