            background-color: white;

        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        #splash-screen h1 { font-size: 3rem; margin-bottom: 1rem; }
        #splash-screen p { font-size: 1.2rem; margin-bottom: 2rem; max-width: 600px; }
        #start-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #e67e22;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        #game-container {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
        }

        #red-line {
            position: absolute;
            top: 30%;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #ff4d4d;
            z-index: 10;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }

        #score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        #counter-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        #scroll-area {
            position: absolute;
            bottom: -100px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .paragraph {
            width: 80%;
            max-width: 800px;
            margin-bottom: 50px;
            line-height: 2;
            font-size: 20px;
            color: #444;
            text-align: left;
        }

        .word {
            display: inline-block;
            padding: 2px 2px;
            margin: 0 0px;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.2s, color 0.2s;
        }

        .word.highlighted {
            background-color: #ffae42; /* Orange */
            color: white;
        }

        .word.correct {
            color: #ccc;
            background: transparent;
            pointer-events: none;
        }

        .word.missed {
            color: #ff4d4d;
            font-weight: bold;
            text-decoration: underline;
        }

        .word.wiggle {
            animation: wiggle 0.3s ease-in-out infinite;
            background-color: #ff4d4d;
            color: white;
        }

        @keyframes wiggle {
            0% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
            100% { transform: translateX(0); }
        }

        #final-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
    </style>
</head>

"Астроном [как-то] сумел связать новые данные с прежней гипотезой, хотя никто до него этого сделать не мог.",
"Журналисты [кое-как] успели записать интервью после научной презентации, хотя в зале началась суматоха.",
"Критик [зачем-то] сосредоточился на второстепенных деталях картины.",
"Комиссия [почему-то] затянула рассмотрение заявки на культурный проект.",
"Музыкальный коллектив [как-то] уверенно исполнил сложную пьесу на фестивале.",
"Профессор [кое-как] разобрался с запутанными результатами исследования."
    ];

    let score = 0;
    let paragraphsLeft = 0;
    let gameActive = false;
    let scrollPos = -2100;
    const scrollSpeed = 0.5;
    const scrollArea = document.getElementById('scroll-area');
    const redLine = document.getElementById('red-line');
    
    let activeParagraphs = [];

    function initGame() {
        const shuffled = [...allParagraphs].sort(() => 0.5 - Math.random());
        const selectedCount = Math.max(1, Math.floor(allParagraphs.length * 0.1));
        activeParagraphs = shuffled.slice(0, selectedCount);
        paragraphsLeft = activeParagraphs.length;
        
        document.getElementById('counter-board').innerText = `Осталось ${paragraphsLeft}`;
        
        activeParagraphs.forEach((text, index) => {
            const pDiv = document.createElement('div');
            pDiv.className = 'paragraph';
            pDiv.dataset.processed = "false";
            
            // Parse text
            const parts = text.split(/(\[.*?\])/);
            parts.forEach(part => {
                if (part.startsWith('[') && part.endsWith(']')) {
                    const word = part.slice(1, -1);
                    const span = document.createElement('span');
                    span.className = 'word unnecessary';
                    span.innerText = word;
                    span.onclick = (e) => toggleHighlight(e.target);
                    pDiv.appendChild(span);
                } else {
                    const words = part.split(' ');
                    words.forEach(w => {
                        if (w === "") return;
                        const span = document.createElement('span');
                        span.className = 'word regular';
                        span.innerText = w;
                        span.onclick = (e) => toggleHighlight(e.target);
                        pDiv.appendChild(span);
                        pDiv.appendChild(document.createTextNode(' '));
                    });
                }
            });
            scrollArea.appendChild(pDiv);
        });
    }

    function toggleHighlight(el) {
        if (!gameActive || el.classList.contains('correct') || el.classList.contains('missed')) return;
        el.classList.toggle('highlighted');
        el.classList.remove('wiggle');
    }

    function gameLoop() {
        if (!gameActive) return;

        scrollPos += scrollSpeed;
        scrollArea.style.bottom = scrollPos + 'px';

        const redLineY = redLine.getBoundingClientRect().top;
        const paragraphs = document.querySelectorAll('.paragraph');

        paragraphs.forEach(p => {
            if (p.dataset.processed === "true") return;

            const rect = p.getBoundingClientRect();
            // If the middle of the paragraph has crossed the line
            if (rect.top <= redLineY) {
                p.dataset.processed = "true";
                processParagraph(p);
                paragraphsLeft--;
                document.getElementById('counter-board').innerText = `Осталось ${paragraphsLeft}`;
                
                if (paragraphsLeft <= 0) {
                    setTimeout(endGame, 2000);
                }
            }
        });

        requestAnimationFrame(gameLoop);
    }

    function processParagraph(pDiv) {
        const words = pDiv.querySelectorAll('.word');
        words.forEach(word => {
            const isUnnecessary = word.classList.contains('unnecessary');
            const isHighlighted = word.classList.contains('highlighted');

            if (isUnnecessary && isHighlighted) {
                // Correct
                score += 1;
                word.classList.remove('highlighted');
                word.classList.add('correct');
            } else if (!isUnnecessary && isHighlighted) {
                // Wrongly highlighted
                score -= 1;
                word.classList.add('wiggle');
            } else if (isUnnecessary && !isHighlighted) {
                // Missed
                score -= 1;
                word.classList.add('missed');
            }
            // Non-unnecessary & non-highlighted: do nothing
        });
        document.getElementById('score-board').innerText = `Уровень дзена: ${score}`;
    }

    function endGame() {
        gameActive = false;
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('final-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = `Уровень дзена: ${score}`;
    }

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        gameActive = true;
        initGame();
        gameLoop();
    };
</script>

</body>
</html>
